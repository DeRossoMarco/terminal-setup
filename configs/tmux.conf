# Native tmux configuration (no Oh My Tmux)

# Terminal and color support
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -g focus-events on
set -s escape-time 10

# Usability
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g status-interval 5

# Better splitting behavior
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Fast config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Visual style aligned with Starship palette
set -g status-style "fg=colour252,bg=colour235"
set -g message-style "fg=colour235,bg=colour39,bold"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 80
setw -g window-status-separator ""

# Plain, reliable window list
setw -g window-status-style "fg=colour250,bg=colour235"
setw -g window-status-current-style "fg=colour231,bg=colour31,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, Z,} "

# Keep content, remove decorative glyphs
set -g status-left " #S "
set -g status-right "#{?client_prefix,[PREFIX],}#{?pane_synchronized,[SYNC],}"

