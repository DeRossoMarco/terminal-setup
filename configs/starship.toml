# Starship Configuration (Neon Capsules)
# Requires a Nerd Font for best rendering.

add_newline = true
command_timeout = 2000
palette = "neon_night"

format = """\
[¯éÂ](fg:sky)\
$directory\
${custom.directory_separator_not_git}\
${custom.directory_separator_git}\
$git_branch\
$git_status\
$git_metrics\
$git_state\
${custom.git_block_end}\
$line_break\
$character"""

right_format = """\
$cmd_duration\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$time"""

[line_break]
disabled = false

[character]
success_symbol = "[ÔØ»](bold fg:green)"
error_symbol = "[ÔØ»](bold fg:red)"
vicmd_symbol = "[ÔØ«](bold fg:lavender)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "fg:text_hi bg:sky"
format = "[ ´ü╝ $path ]($style)"
read_only = " ´Çú"
read_only_style = "fg:text_hi bg:sky"

[git_branch]
symbol = "´Éÿ "
style = "fg:text_hi bg:peach"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:text_hi bg:peach"
format = "[($all_status$ahead_behind )]($style)"

[git_metrics]
disabled = false
format = "[+$added]($added_style)[-$deleted ]($deleted_style)"
added_style = "bold fg:#22c55e bg:peach"
deleted_style = "bold fg:#ef4444 bg:peach"

[git_state]
style = "fg:text_hi bg:peach"
format = "[($state( $progress_current/$progress_total) )]($style)"

[cmd_duration]
min_time = 1500
format = "[¯éÂ](fg:surface2)[ ´ëÆ $duration ](fg:text_hi bg:surface2)[¯é┤ ](fg:surface2)"

[nodejs]
symbol = "¯£ÿ "
format = "[¯éÂ](fg:green)[ $symbol($version) ](fg:text_hi bg:green)[¯é┤ ](fg:green)"

[python]
symbol = "¯êÁ "
format = '[¯éÂ](fg:blue)[ $symbol${pyenv_prefix}(${version})( \($virtualenv\)) ](fg:text_hi bg:blue)[¯é┤ ](fg:blue)'

[rust]
symbol = "¯×¿ "
format = "[¯éÂ](fg:orange)[ $symbol($version) ](fg:text_hi bg:orange)[¯é┤ ](fg:orange)"

[golang]
symbol = "¯ÿº "
format = "[¯éÂ](fg:cyan)[ $symbol($version) ](fg:text_hi bg:cyan)[¯é┤ ](fg:cyan)"

[docker_context]
symbol = "´îê "
format = "[¯éÂ](fg:iris)[ $symbol$context ](fg:text_hi bg:iris)[¯é┤ ](fg:iris)"

[time]
disabled = false
time_format = "%H:%M"
format = "[¯éÂ](fg:lavender)[ ´É║ $time ](fg:text_hi bg:lavender)[¯é┤](fg:lavender)"

[custom.directory_separator_git]
description = "Separator after directory when inside a git repository"
command = ""
format = "[¯é░](fg:sky bg:peach)"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[custom.directory_separator_not_git]
description = "Rounded end after directory when outside git"
command = ""
format = "[¯é┤](fg:sky)"
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[custom.git_block_end]
description = "Rounded end after git block when inside git"
command = ""
format = "[¯é┤](fg:peach)"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[palettes.neon_night]
text = "#cfd6e6"
text_hi = "#f8fbff"
crust = "#0f1220"
surface2 = "#35415f"
sky = "#2f6dbe"
peach = "#9a5a2b"
lavender = "#5f5bd6"
iris = "#6f3fb6"
blue = "#2d5bb6"
cyan = "#1f7f73"
green = "#2e8b57"
mint = "#2fa38a"
orange = "#ad6a2f"
red = "#b64668"
